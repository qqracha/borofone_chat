name: Deploy

on:
  push:
    branches:
      - dev
      - main

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-staging:
    name: Deploy Staging
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euxo pipefail
            cd /opt/borofone-chat-staging
            echo "[deploy] $(date -Is) start staging commit=${{ github.sha }}"
            git fetch --prune origin
            git checkout dev
            git reset --hard origin/dev
            rm -f deploy/docker/.env
            docker-compose -f deploy/docker/docker-compose.staging.yml up -d postgres redis
            docker-compose -f deploy/docker/docker-compose.staging.yml exec -T postgres sh -lc 'psql -U "${POSTGRES_USER:-app}" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='\''${POSTGRES_DB:-borofone_staging}'\''" | grep -q 1 || psql -U "${POSTGRES_USER:-app}" -d postgres -c "CREATE DATABASE ${POSTGRES_DB:-borofone_staging}"'
            docker-compose -f deploy/docker/docker-compose.staging.yml run --rm api alembic upgrade head
            docker rm -f docker_api_1 2>/dev/null || true
            docker-compose -f deploy/docker/docker-compose.staging.yml up -d --build api
            docker-compose -f deploy/docker/docker-compose.staging.yml ps
            echo "[deploy] $(date -Is) done staging commit=${{ github.sha }}"

  deploy-production:
    name: Deploy Production
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script_stop: true
          command_timeout: 30m
          script: |
            set -euxo pipefail
            cd /opt/borofone-chat-prod
            echo "[deploy] $(date -Is) start production commit=${{ github.sha }}"
            git fetch --prune origin
            git checkout main
            git reset --hard origin/main
            rm -f deploy/docker/.env
            docker-compose -f deploy/docker/docker-compose.prod.yml up -d postgres redis
            docker-compose -f deploy/docker/docker-compose.prod.yml exec -T postgres sh -lc 'psql -U "${POSTGRES_USER:-app}" -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='\''${POSTGRES_DB:-borofone_prod}'\''" | grep -q 1 || psql -U "${POSTGRES_USER:-app}" -d postgres -c "CREATE DATABASE ${POSTGRES_DB:-borofone_prod}"'
            docker-compose -f deploy/docker/docker-compose.prod.yml run --rm api alembic upgrade head
            docker rm -f docker_api_1 2>/dev/null || true
            docker-compose -f deploy/docker/docker-compose.prod.yml up -d --build api
            docker-compose -f deploy/docker/docker-compose.prod.yml ps
            echo "[deploy] $(date -Is) done production commit=${{ github.sha }}"

