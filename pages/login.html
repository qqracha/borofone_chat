<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Borofone Chat - Вход</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/login.css">
</head>
<body>
    <div class="bg-animation">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <!-- Абстрактное лого -->
    <div class="logo-badge">
        <div class="logo-container">
            <div class="logo-shape"></div>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <!-- Левая секция - форма -->
            <div class="form-section">
                <h1>С возвращением!</h1>
                <p class="subtitle">Мы рады видеть вас снова</p>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input 
                            id="email" 
                            type="email" 
                            placeholder="your@email.com" 
                            required 
                            autocomplete="email"
                        />
                    </div>

                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <input 
                            id="password" 
                            type="password" 
                            placeholder="Введите пароль" 
                            required
                            autocomplete="current-password"
                        />
                    </div>

                    <div class="form-footer">
                        <div class="checkbox-wrapper">
                            <input type="checkbox" id="remember" />
                            <label for="remember">Запомнить меня</label>
                        </div>
                        <a href="#" class="forgot-password">Забыли пароль?</a>
                    </div>

                    <button type="submit">Войти</button>
                    <div class="error" id="errorText"></div>
                </form>

                <div class="footer">
                    Нет аккаунта? <a href="./register.html">Зарегистрироваться</a>
                </div>
            </div>

            <!-- Правая секция - QR -->
            <div class="qr-section">
                <div class="qr-placeholder">
                    <div class="qr-icon">📱</div>
                </div>
                <h3 class="qr-title">Быстрый вход</h3>
                <p class="qr-description">
                    Отсканируйте QR-код в мобильном приложении для мгновенного входа
                </p>
            </div>
        </div>
    </div>

    <!-- Живые подсказки -->
    <div class="tips-container">
        <div class="tip-card" id="tipCard">
            <div class="tip-header">
                <div class="tip-marker">//</div>
                <div class="tip-title">Совет</div>
            </div>
            <div class="tip-content" id="tipContent">
                Используйте надёжный пароль длиной не менее 12 символов
            </div>
            <div class="tip-progress" id="tipProgress"></div>
        </div>
    </div>

    <script src="/app-config.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/tips.js"></script>
</body>
</html>
