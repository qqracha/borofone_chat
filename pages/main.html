<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borofone Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/notifications.css">
    <link rel="stylesheet" href="styles/presence.css">
    <link rel="stylesheet" href="styles/attachments.css">
</head>
<body>
    <div class="bg-animation">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <div class="app-container">
        <!-- Rooms Sidebar -->
        <aside class="rooms-sidebar">
            <div class="sidebar-header">
                <div class="logo-container">
                    <div class="logo-shape"></div>
                </div>
                <h2 class="sidebar-title">Комнаты</h2>
            </div>
            <div class="rooms-list" id="roomsList">
                <div class="placeholder-message">
                    <span class="placeholder-icon">#</span>
                    <p>Загрузка комнат...</p>
                </div>
            </div>
            <div class="sidebar-footer">
                <div class="current-user-card" id="currentUserCard">
                    <div class="current-user-avatar" id="currentUserAvatar"></div>
                    <div class="current-user-meta">
                        <div class="current-user-name" id="currentUserName">Пользователь</div>
                        <div class="current-user-username" id="currentUserUsername">@username</div>
                    </div>
                </div>
                <button class="create-room-btn" id="createRoomBtn">
                    <span class="btn-icon">+</span>
                    <span class="btn-text">Создать комнату</span>
                </button>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <header class="chat-header">
                <div class="header-left">
                    <div class="room-indicator"></div>
                    <h1 class="room-name" id="roomName">Выберите комнату</h1>
                </div>
                <div class="header-right">
                    <div class="connection-status connecting" id="connectionStatus">
                        <span class="status-dot"></span>
                        <span class="status-text">Подключение...</span>
                    </div>
                    <button class="icon-btn settings-btn" id="settingsBtn" title="Настройки">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M12 1v6m0 6v6m9-9h-6m-6 0H3"></path>
                        </svg>
                    </button>
                </div>
            </header>

            <div class="messages-container" id="messagesContainer">
                <div class="messages-list" id="messagesList">
                    <div class="placeholder-message">
                        <span class="placeholder-icon">💬</span>
                        <p>Выберите комнату, чтобы начать общение</p>
                    </div>
                </div>
            </div>

            <div class="message-input-container">
                <form class="message-form" id="messageForm">
                    <div class="input-wrapper">
                        <button type="button" class="attach-btn" id="attachBtn" title="Прикрепить файлы">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"></path>
                            </svg>
                        </button>
                        <input
                            type="text"
                            id="messageInput"
                            placeholder="Выберите комнату..."
                            autocomplete="off"
                            disabled
                        />
                        <button type="submit" class="send-btn" id="sendBtn" disabled>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                                <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </button>
                    </div>
                </form>
            </div>
        </main>

        <!-- Users Sidebar -->
        <aside class="users-sidebar" id="usersSidebar">
            <div class="sidebar-header">
                <h3 class="sidebar-title">Участники</h3>
                <span class="users-count" id="usersCount">0</span>
            </div>
            <div class="users-list" id="usersList">
                <div class="placeholder-message">
                    <p>Список участников появится в следующем обновлении</p>
                </div>
            </div>
        </aside>
    </div>

    <!-- Create Room Modal -->
    <div class="modal-overlay" id="createRoomModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Создать комнату</h3>
                <button class="modal-close" id="closeModalBtn">&times;</button>
            </div>
            <form id="createRoomForm">
                <div class="form-group">
                    <label for="roomNameInput">Название комнаты</label>
                    <input
                        type="text"
                        id="roomNameInput"
                        placeholder="Введите название..."
                        required
                        maxlength="50"
                    />
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="cancelModalBtn">Отмена</button>
                    <button type="submit" class="btn-primary">Создать</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content settings-modal-content">
            <div class="modal-header">
                <h3>Настройки профиля</h3>
                <button class="modal-close" id="closeSettingsBtn">&times;</button>
            </div>
            <form id="settingsForm">
                <div class="settings-avatar-section">
                    <div class="settings-avatar-preview" id="settingsAvatarPreview"></div>
                    <div class="settings-avatar-controls">
                        <label class="btn-secondary file-label" for="avatarInput">Выбрать аватар</label>
                        <input type="file" id="avatarInput" accept="image/*">
                        <button type="button" class="btn-secondary" id="removeAvatarBtn">Удалить аватар</button>
                    </div>
                </div>
                <div class="form-group">
                    <label for="settingsDisplayName">Отображаемое имя</label>
                    <input type="text" id="settingsDisplayName" maxlength="50" required>
                </div>
                <div class="form-group">
                    <label for="settingsUsername">Username</label>
                    <input type="text" id="settingsUsername" maxlength="32" required>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="cancelSettingsBtn">Отмена</button>
                    <button type="submit" class="btn-primary">Сохранить</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/notifications.js"></script>
    <script src="js/attachments.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
