<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Borofone Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --accent: #D67655;
            --accent-hover: #E88669;
            --accent-dim: rgba(214, 118, 85, 0.1);
            --accent-border: rgba(214, 118, 85, 0.3);
            
            --bg-primary: #0A0A0B;
            --bg-secondary: #111113;
            --bg-tertiary: #1A1A1C;
            --bg-hover: #222224;
            --bg-input: #0F0F10;
            
            --text-primary: #E8E8E9;
            --text-secondary: #A0A0A3;
            --text-dim: #6B6B6E;
            
            --border: #2A2A2C;
            --border-focus: var(--accent-border);
            
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        .app-container {
            display: flex;
            height: 100vh;
            position: relative;
        }

        /* === SERVERS === */
        .servers {
            width: 72px;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px 0;
            gap: 8px;
            overflow-y: auto;
        }

        .server-icon {
            width: 48px;
            height: 48px;
            background: var(--bg-tertiary);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            font-weight: 600;
            font-size: 18px;
            color: var(--text-secondary);
        }

        .server-icon:hover {
            border-radius: 12px;
            background: var(--accent);
            color: white;
            transform: translateY(-2px);
        }

        .server-icon.active {
            border-radius: 12px;
            background: var(--accent);
            color: white;
        }

        .server-icon.active::before {
            content: '';
            position: absolute;
            left: -12px;
            width: 4px;
            height: 40px;
            background: white;
            border-radius: 0 2px 2px 0;
        }

        .server-divider {
            width: 32px;
            height: 2px;
            background: var(--border);
            border-radius: 1px;
            margin: 4px 0;
        }

        /* === ROOMS === */
        .rooms {
            width: 240px;
            background: var(--bg-tertiary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .rooms-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .rooms-header:hover {
            background: var(--bg-hover);
        }

        .rooms-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .room-item {
            padding: 6px 12px;
            margin: 1px 0;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 15px;
            color: var(--text-secondary);
        }

        .room-item:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .room-item.active {
            background: var(--accent-dim);
            color: var(--accent);
            font-weight: 500;
        }

        .room-item::before {
            content: '#';
            color: var(--text-dim);
            font-weight: 600;
        }

        .room-item.active::before {
            color: var(--accent);
        }

        /* === CHAT === */
        .chat {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            height: 60px;
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-secondary);
        }

        .chat-header::before {
            content: '#';
            font-size: 20px;
            font-weight: 600;
            color: var(--text-dim);
        }

        .chat-title {
            font-size: 16px;
            font-weight: 600;
        }

        .chat-description {
            font-size: 13px;
            color: var(--text-dim);
            margin-left: 8px;
            padding-left: 8px;
            border-left: 1px solid var(--border);
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .message {
            padding: 4px 16px;
            display: flex;
            gap: 16px;
            transition: background 0.1s;
            border-radius: 4px;
            animation: messageIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
        }

        .message:hover {
            background: var(--bg-secondary);
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 16px;
            color: white;
            flex-shrink: 0;
        }

        .message-content {
            flex: 1;
        }

        .message-header {
            display: flex;
            gap: 8px;
            margin-bottom: 2px;
        }

        .message-author {
            font-weight: 600;
            font-size: 15px;
        }

        .message-time {
            font-size: 12px;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
        }

        .message-text {
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        /* === INPUT === */
        .chat-input-wrapper {
            padding: 20px;
        }

        .chat-input-container {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            transition: all 0.2s;
        }

        .chat-input-container:focus-within {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        .chat-input {
            width: 100%;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 15px;
            font-family: inherit;
            resize: none;
        }

        .chat-input::placeholder {
            color: var(--text-dim);
        }

        .input-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
        }

        .input-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.15s;
            font-family: inherit;
        }

        .input-btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            font-weight: 500;
        }

        .input-btn.primary:hover {
            background: var(--accent-hover);
        }

        .input-btn.primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* === STATUS BAR === */
        .status-bar {
            height: 52px;
            background: var(--bg-tertiary);
            border-top: 1px solid var(--border);
            padding: 0 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            color: white;
        }

        .status-info {
            flex: 1;
        }

        .status-name {
            font-size: 14px;
            font-weight: 600;
        }

        .status-tag {
            font-size: 12px;
            color: var(--text-dim);
            font-family: 'JetBrains Mono', monospace;
        }

        /* === CONNECTION STATUS === */
        .connection-status {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 6px 12px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
            z-index: 10;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--text-dim);
        }

        .status-dot.connected {
            background: #4CAF50;
            box-shadow: 0 0 8px rgba(76, 175, 80, 0.5);
        }

        .status-dot.connecting {
            background: #FFA726;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .welcome {
            text-align: center;
            padding: 40px 20px;
            opacity: 0.7;
        }

        .welcome h2 {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .welcome p {
            font-size: 14px;
            color: var(--text-secondary);
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--bg-hover);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="connection-status">
            <div class="status-dot" id="connectionDot"></div>
            <span id="connectionText">Connecting...</span>
        </div>

        <div class="servers">
            <div class="server-icon active">B</div>
            <div class="server-divider"></div>
            <div class="server-icon">+</div>
        </div>

        <div class="rooms">
            <div class="rooms-header">Borofone Chat</div>
            <div class="rooms-list" id="roomsList"></div>
            <div class="status-bar">
                <div class="status-avatar" id="userAvatar">U</div>
                <div class="status-info">
                    <div class="status-name" id="userName">User</div>
                    <div class="status-tag" id="userTag">#0000</div>
                </div>
            </div>
        </div>

        <div class="chat">
            <div class="chat-header">
                <div class="chat-title" id="chatTitle">general</div>
                <div class="chat-description">Welcome to Borofone Chat</div>
            </div>

            <div class="messages" id="messages">
                <div class="welcome">
                    <h2>Welcome to #general</h2>
                    <p>This is the beginning of your conversation</p>
                </div>
            </div>

            <div class="chat-input-wrapper">
                <div class="chat-input-container">
                    <textarea class="chat-input" id="messageInput" placeholder="Message #general" rows="1"></textarea>
                    <div class="input-actions">
                        <button class="input-btn primary" id="sendBtn" disabled>Send</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:8000';
        const WS_URL = 'ws://localhost:8000';
        
        let currentRoom = null;
        let ws = null;
        let username = localStorage.getItem('chat_username') || 'User' + Math.floor(Math.random() * 10000);
        let rooms = [];
        
        const messagesContainer = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const roomsList = document.getElementById('roomsList');
        const chatTitle = document.getElementById('chatTitle');
        const userName = document.getElementById('userName');
        const userTag = document.getElementById('userTag');
        const userAvatar = document.getElementById('userAvatar');
        const connectionDot = document.getElementById('connectionDot');
        const connectionText = document.getElementById('connectionText');
        
        async function init() {
            userName.textContent = username;
            userTag.textContent = '#' + username.slice(-4).padStart(4, '0');
            userAvatar.textContent = username[0].toUpperCase();
            localStorage.setItem('chat_username', username);
            
            await loadRooms();
            
            if (rooms.length > 0) {
                selectRoom(rooms[0].id);
            } else {
                await createDefaultRoom();
            }
        }
        
        async function loadRooms() {
            try {
                rooms = [{ id: 1, title: 'general' }];
                renderRooms();
            } catch (err) {
                console.error('Failed to load rooms:', err);
            }
        }
        
        async function createDefaultRoom() {
            try {
                const response = await fetch(`${API_URL}/rooms`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: 'general' })
                });
                const room = await response.json();
                rooms.push(room);
                renderRooms();
                selectRoom(room.id);
            } catch (err) {
                console.error('Failed to create room:', err);
            }
        }
        
        async function loadMessages(roomId) {
            try {
                const response = await fetch(`${API_URL}/rooms/${roomId}/messages?limit=50`);
                const messages = await response.json();
                
                messagesContainer.innerHTML = '';
                messages.forEach(msg => addMessage(msg, false));
                scrollToBottom();
            } catch (err) {
                console.error('Failed to load messages:', err);
            }
        }
        
        function connectWebSocket(roomId) {
            if (ws) ws.close();
            
            updateConnectionStatus('connecting');
            
            ws = new WebSocket(`${WS_URL}/ws/rooms/${roomId}`);
            
            ws.onopen = () => {
                console.log('WebSocket connected');
                updateConnectionStatus('connected');
            };
            
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                if (data.type === 'message.new') {
                    addMessage(data.message, true);
                } else if (data.type === 'error') {
                    console.error('WebSocket error:', data);
                }
            };
            
            ws.onerror = () => updateConnectionStatus('error');
            
            ws.onclose = () => {
                console.log('WebSocket disconnected');
                updateConnectionStatus('disconnected');
                setTimeout(() => currentRoom && connectWebSocket(currentRoom), 3000);
            };
        }
        
        function updateConnectionStatus(status) {
            connectionDot.className = 'status-dot';
            
            const statuses = {
                connected: ['connected', 'Connected'],
                connecting: ['connecting', 'Connecting...'],
                disconnected: ['', 'Disconnected'],
                error: ['', 'Connection Error']
            };
            
            const [className, text] = statuses[status];
            if (className) connectionDot.classList.add(className);
            connectionText.textContent = text;
        }
        
        function renderRooms() {
            roomsList.innerHTML = rooms.map(room => `
                <div class="room-item ${currentRoom === room.id ? 'active' : ''}" 
                     onclick="selectRoom(${room.id})">
                    ${room.title}
                </div>
            `).join('');
        }
        
        async function selectRoom(roomId) {
            currentRoom = roomId;
            const room = rooms.find(r => r.id === roomId);
            
            if (room) {
                chatTitle.textContent = room.title;
                messageInput.placeholder = `Message #${room.title}`;
            }
            
            renderRooms();
            await loadMessages(roomId);
            connectWebSocket(roomId);
        }
        
        function addMessage(msg, animate = false) {
            const messageEl = document.createElement('div');
            messageEl.className = 'message';
            if (!animate) messageEl.style.animation = 'none';
            
            const authorInitial = msg.author[0].toUpperCase();
            const time = new Date(msg.created_at).toLocaleTimeString('ru-RU', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            
            messageEl.innerHTML = `
                <div class="message-avatar">${authorInitial}</div>
                <div class="message-content">
                    <div class="message-header">
                        <span class="message-author">${msg.author}</span>
                        <span class="message-time">${time}</span>
                    </div>
                    <div class="message-text">${escapeHtml(msg.body)}</div>
                </div>
            `;
            
            messagesContainer.appendChild(messageEl);
            if (animate) scrollToBottom();
        }
        
        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        messageInput.addEventListener('input', (e) => {
            e.target.style.height = 'auto';
            e.target.style.height = e.target.scrollHeight + 'px';
            sendBtn.disabled = !e.target.value.trim();
        });
        
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        sendBtn.addEventListener('click', sendMessage);
        
        function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
            
            ws.send(JSON.stringify({
                author: username,
                body: text,
                nonce: Date.now() + '-' + Math.random().toString(36).substr(2, 9)
            }));
            
            messageInput.value = '';
            messageInput.style.height = 'auto';
            sendBtn.disabled = true;
        }
        
        init();
    </script>
</body>
</html>
