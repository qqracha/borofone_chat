<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Borofone Chat - Регистрация</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/register.css">
</head>
<body>
    <div class="bg-animation">
        <div class="gradient-orb orb-1"></div>
        <div class="gradient-orb orb-2"></div>
        <div class="gradient-orb orb-3"></div>
    </div>

    <div class="logo-badge">
        <div class="logo-container">
            <div class="logo-shape"></div>
        </div>
    </div>

    <div class="container">
        <div class="card">
            <div class="form-section">
                <h1>Создайте аккаунт</h1>
                <p class="subtitle">Присоединяйтесь к Borofone Chat</p>

                <form id="registerForm">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input id="email" type="email" placeholder="your@email.com" required autocomplete="email" />
                    </div>

                    <div class="form-group">
                        <label for="username">Username</label>
                        <input id="username" type="text" placeholder="username" required maxlength="32" autocomplete="username" />
                    </div>

                    <div class="form-group">
                        <label for="displayName">Отображаемое имя</label>
                        <input id="displayName" type="text" placeholder="Ваше имя" required maxlength="50" />
                    </div>

                    <div class="form-group">
                        <label for="password">Пароль</label>
                        <input id="password" type="password" placeholder="Минимум 8 символов" required minlength="8" autocomplete="new-password" />
                    </div>

                    <div class="form-group">
                        <label for="inviteCode">Инвайт-код</label>
                        <input id="inviteCode" type="text" placeholder="Введите код приглашения" required />
                    </div>

                    <button type="submit">Зарегистрироваться</button>
                    <div class="error" id="errorText"></div>
                </form>

                <div class="footer">
                    Уже есть аккаунт? <a href="./login.html">Войти</a>
                </div>
            </div>
        </div>
    </div>

    <script src="/app-config.js"></script>
    <script src="js/config.js"></script>
    <script>
        const API_URL = window.getApiUrl ? window.getApiUrl() : window.location.origin;
        const APP_ROUTES = window.getAppRoutes ? window.getAppRoutes() : { main: '/main.html' };

        const registerForm = document.getElementById('registerForm');
        const errorText = document.getElementById('errorText');

        registerForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            errorText.textContent = '';

            const payload = {
                email: document.getElementById('email').value.trim(),
                username: document.getElementById('username').value.trim(),
                display_name: document.getElementById('displayName').value.trim(),
                password: document.getElementById('password').value.trim(),
                invite_code: document.getElementById('inviteCode').value.trim(),
            };

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST',
                    credentials: 'include',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload),
                });

                const data = await response.json();
                if (!response.ok) {
                    errorText.textContent = data.detail || 'Ошибка регистрации';
                    return;
                }

                window.location.href = APP_ROUTES.main;
            } catch (err) {
                errorText.textContent = 'Ошибка сети. Попробуйте позже.';
            }
        });
    </script>
</body>
</html>
